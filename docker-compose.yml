services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-predictepl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-predictepl}
      POSTGRES_DB: ${POSTGRES_DB:-predictepl}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predictepl"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1-full
    restart: unless-stopped
    command: ["bash", "-c", "pip install psycopg2-binary -q && mlflow server --backend-store-uri postgresql://${POSTGRES_USER:-predictepl}:${POSTGRES_PASSWORD:-predictepl}@db:5432/mlflow --default-artifact-root /mlflow/artifacts --host 0.0.0.0 --port 5000 --disable-security-middleware"]
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      db:
        condition: service_healthy
    environment:
      - MLFLOW_TRACKING_URI=http://localhost:5000

  mlflow-db-init:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    entrypoint: >
      sh -c "
        PGPASSWORD=${POSTGRES_PASSWORD:-predictepl} psql -h db -U ${POSTGRES_USER:-predictepl} -tc \"SELECT 1 FROM pg_database WHERE datname = 'mlflow'\" | grep -q 1 || PGPASSWORD=${POSTGRES_PASSWORD:-predictepl} psql -h db -U ${POSTGRES_USER:-predictepl} -c 'CREATE DATABASE mlflow'
      "
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-predictepl}:${POSTGRES_PASSWORD:-predictepl}@db:5432/${POSTGRES_DB:-predictepl}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  mlflow_artifacts:
